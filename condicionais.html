<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabuada</title>
  </head>

  <body>
    <div id="container">
      <h1>Tabuada</h1>
      <input type="number" id="valor" placeholder="Digite um número" />
      <button onclick="gerarTabuada()">Gerar</button>
      <div id="resultado"></div>
    </div>
    <script>
      function gerarTabuada() {
        let numero = Number(document.getElementById("valor").value);
        let resultado = document.getElementById("resultado");

        if (!numero) {
          resultado.innerHTML = "<p>Digite um número válido.</p>";
          return;
        }

        resultado.innerHTML = "";
        for (let i = 1; i <= 10; i++) {
          resultado.innerHTML += `
            <p>${numero} x ${i} = ${numero * i}</p>
          `;
        }
      }
    </script>
  </body>
</html>
