<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Verificador de Números Primos</title>
</head>
<body>
    <h1>Verificador de Números Primos</h1>
    <p id="resultado"></p>

    <script>
        let numero = Number(prompt("Qual o número?"));
        let isPrimo = numero > 1; 
        let valor = "";

        for (let i = 2; i < numero; i++) {
            if (numero % i === 0) {
                isPrimo = false;
                break;
            }
        }

        if (isPrimo) {
            valor = "é um número primo.";
        } else {
            valor = "não é um número primo.";
        }

        
        let ver = document.getElementById("resultado");
        ver.innerText = `O número ${numero} ${valor}`;
        
        console.log(numero + " " + valor);
    </script>
</body>
</html>
